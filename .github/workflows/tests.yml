name: Run Vaverka Tests

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  aws-tests:
    name: AWS Runner Tests
    runs-on: [self-hosted, aws]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run docker-compose on AWS (host mode)
        run: |
          docker-compose -f docker-compose.yaml -f docker-compose.aws-n-host.yaml --build up
        continue-on-error: false

  home-tests:
    name: Home Runner Tests
    runs-on: [self-hosted, home]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run docker-compose on Home (bridge mode)
        run: |
          docker-compose -f docker-compose.yaml -f docker-compose.home-n-bridge.yaml --build up
        continue-on-error: false

      - name: Run docker-compose on Home (host mode)
        run: |
          docker-compose -f docker-compose.yaml -f docker-compose.home-n-host.yaml --build up
        continue-on-error: false
