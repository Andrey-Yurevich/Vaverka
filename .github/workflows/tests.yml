name: Run Vaverka Tests

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  aws-tests:
    name: AWS Runner Tests
    runs-on: [self-hosted, aws]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run docker-compose on AWS (host mode)
        run: |
          cd scanner
          docker compose -f docker-compose.yaml -f docker-compose.aws-n-host.yaml up --build --exit-code-from vaverka
        continue-on-error: false

  home-tests:
    environment: tests
    env:
      HOME_N_BRIDGE_ROUTER_IP: ${{ vars.HOME_N_BRIDGE_ROUTER_IP }}
      HOME_N_BRIDGE_SELF_IP: ${{ vars.HOME_N_BRIDGE_SELF_IP }}
      HOME_N_BRIDGE_TARGET_NETWORK: ${{ vars.HOME_N_BRIDGE_TARGET_NETWORK }}
      HOME_N_HOST_ROUTER_IP: ${{ vars.HOME_N_HOST_ROUTER_IP }}
      HOME_N_HOST_TARGET_INTERFACE: ${{ vars.HOME_N_HOST_TARGET_INTERFACE }}
      HOME_N_HOST_TARGET_NETWORK: ${{ vars.HOME_N_HOST_TARGET_NETWORK }}
    name: Home Runner Tests
    runs-on: [self-hosted, home]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run docker-compose on Home (bridge mode)
        run: |
          cd scanner
          env
          docker compose -f docker-compose.yaml -f docker-compose.home-n-bridge.yaml up --build --exit-code-from vaverka
        continue-on-error: false

      - name: Run docker-compose on Home (host mode)
        run: |
          cd scanner
          env
          docker compose -f docker-compose.yaml -f docker-compose.home-n-host.yaml up --build --exit-code-from vaverka
        continue-on-error: false
